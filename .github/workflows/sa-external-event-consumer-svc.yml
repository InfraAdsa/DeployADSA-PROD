name: sa-external-event-consumer-svc_PRD_SRV_95 --- sa-external-event-consumer-svc ---
on:
  workflow_dispatch:
    branches:
      - main # Aqui va la rama
jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Copiar código
        uses: actions/checkout@v3

      - name: Añadir clave SSH al agente
        uses: webfactory/ssh-agent@v0.4.1
        with:
         ssh-private-key: ${{secrets.SSH_PRIVATE_KEY_95}} # Clave privada

      - name: Conectar y ejecutar comandos en el servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.HOSTNAME_95}} 	# Nombre de host
          username: ${{secrets.SSH_USERNAME_95}} # nombre de usuario
          key: ${{secrets.SSH_PRIVATE_KEY_95}} # Clave privada
          script: |
            echo "### path servidor 8.95 ###"
            cd /adsaenv/adsa/app/adsaweb
            pwd
            ls -lrt 
            echo "###  respaldo del repositorio del servidor ###"
            mv external-event-consumer /adsaenv/adsa/app/adsaweb/backup/external-event-consumer_$(date +'%Y%m%d-%H%M')
            ls -lrt 
            echo '### Clonar el repositorio sa-wfm-event-ingestor-svc ###'
            git clone -b main https://${{secrets.GH_ACCESS_KEY_JALS}}@github.com/joseantonio-lpz/sa-external-event-consumer-svc.git
            echo '### Repositorio clonado ###' 
            ls -lrt
            sleep 40
            echo '### Detener y eliminar el Contenedor external-event-consumer ###'
            docker ps
            docker stop external-event-consumer
            sleep 40
            docker rm external-event-consumer
            echo '### elimininar la imagen ###'
            #docker images
            sleep 40
            docker rmi external-event-consumer
            docker images
            echo '### Ejecutar el build y el deploy ###'
            cd /adsaenv/adsa/app/adsaweb/sa-external-event-consumer-svc
            ls -lrt
            docker build -t external-event-consumer .
            sleep 2
            docker run -d -p 8184:8080 -e  SPRING_PROFILES_ACTIVE=PROD --name external-event-consumer external-event-consumer
            sleep 2
            echo '### contenedores corriendo ###'
            docker ps -a
            # echo '###### Enviar correo ######'
            #cd /adsaenv/adsa/app/adsaweb
            #docker ps -a > deploy.txt
            #mail -s "Deploy realizado proyecto WFM_Event_Ingestor_PRD -- sa-external-event-ingestor-svc" joseantonio.lopez@seccionamarilla.com < deploy.txt
            #echo '###### fin del workflow ######''     
