name: sa-external-event-consumer-svc_updated_95 -- 

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    env:
      APP_NAME: external-event-consumer
      IMAGE_NAME: external-event-consumer
      BASE_PATH: /adsaenv/adsa/app/adsaweb
      REPO_NAME: sa-external-event-consumer-svc
      BRANCH: main

    steps:
      - name: Deploy remoto en servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTNAME_95 }}
          username: ${{ secrets.SSH_USERNAME_95 }}
          key: ${{ secrets.SSH_PRIVATE_KEY_95 }}
          script: |
           set -e

           echo "=== INICIANDO DEPLOY $REPO_NAME ==="

           cd /adsaenv/adsa/app/adsaweb
           echo $BASE_PATH
           
           # Backup si existe $REPO_NAME
           if [ -d  $REPO_NAME ]; then
             echo "Creando respaldo..."
             mv  $REPO_NAME  $BASE_PATH/backup/$REPO_NAME_$(date +'%Y%m%d-%H%M')
           fi

           echo "Clonando repositorio..."
           git clone -b main https://${{secrets.GH_ACCESS_KEY}}@github.com/jeacor/sa-bcm-content-api.git

           cd $REPO_NAME
           pwd
           echo "Deteniendo contenedor $APP_NAME si existe..."
           docker stop $APP_NAME 2>/dev/null || true
           docker rm $APP_NAME 2>/dev/null || true

           echo "Eliminando imagen anterior..."
           docker rmi $IMAGE_NAME 2>/dev/null || true

           echo "Construyendo imagen Docker..."
           docker build -t $IMAGE_NAME .

           echo "Levantando contenedor..."
           docker run -d -p 8184:8080 -e SPRING_PROFILES_ACTIVE=PROD --name $APP_NAME $IMAGE_NAME

           echo "Verificando contenedor $APP_NAME ...:)"
           docker ps -a

           echo "fin del workflow :)"
           echo "=== DEPLOY FINALIZADO $APP_NAME PROD ==="
